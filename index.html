<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenerr</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230f380f%22/></svg>">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="menu-container">
        <!-- Contenedor del Logo con mini bloques píxel de fondo -->
        <div class="logo-box">
            <h1 class="game-title">GREENERR</h1>
            <div class="pixel-decor"></div>
        </div>

        <p class="game-tagline">Un plataformero monocromático de acción.</p>

        <!-- Sección de Controles en formato tarjeta retro -->
        <div class="controls-card">
            <h3>Controlees</h3>
            <ul>
                <li><span>← / →</span> Moverse a los lados</li>
                <li><span>↑</span> Saltar (Coyote time activo)</li>
                <li><span>X</span> Atacar / Agarrar / Cargar Lanzamiento / Disparar</li>
                <li><span>P</span> Pausar partida</li>
            </ul>
        </div>

        <!-- Botón de Acción Principal -->
        <a href="game.html" class="btn-play">INICIAR JUEGO</a>
        
        <div class="footer-credit">
            <p>Greenerr v0.1.0 | jahp © 2026</p>
        </div>
    </div>
</body>
</html>
