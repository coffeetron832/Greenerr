<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenerr</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link id="dynamic-favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f380f'/></svg>">
    
    <script>
        const colors = ['#0f380f', '#306230', '#8bac0f', '#9bbc0f'];
        let currentIndex = 0;

        setInterval(() => {
            currentIndex = (currentIndex + 1) % colors.length;
            const color = colors[currentIndex];
            const favicon = document.getElementById('dynamic-favicon');
            
            favicon.href = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='${encodeURIComponent(color)}'/></svg>`;
        }, 2000);
    </script>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="menu-container">
        <div class="logo-box">
            <h1 class="game-title">GREENERR</h1>
            <div class="pixel-decor"></div>
        </div>

        <p class="game-tagline">Un plataformero monocromático de acción.</p>

        <div class="controls-card">
            <h3>Controlees</h3>
            <ul>
                <li><span>← / →</span> Moverse a los lados</li>
                <li><span>↑</span> Saltar (Coyote time activo)</li>
                <li><span>X</span> Atacar / Agarrar / Cargar Lanzamiento / Disparar</li>
                <li><span>P</span> Pausar partida</li>
            </ul>
        </div>

        <a href="game.html" class="btn-play">INICIAR JUEGO</a>
        
        <div class="footer-credit">
            <p>Greenerr v0.1.0 | jahp © 2026</p>
        </div>
    </div>
</body>
</html>
